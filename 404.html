<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>页面不存在 | CACO PRO</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #15302b 0%, #0d1d1a 100%);
      color: #162723;
    }
    .card {
      width: min(calc(100% - 32px), 720px);
      padding: 32px;
      border-radius: 28px;
      background: rgba(248, 242, 233, 0.96);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
    }
    h1 { margin: 0 0 10px; font-size: 42px; line-height: 1; }
    p { margin: 0 0 18px; color: rgba(22, 39, 35, 0.72); line-height: 1.7; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      background: #132822;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>页面不存在</h1>
    <p>这个路径还没有内容，或者已经被调整。先回到主页，或者去分享目录继续看。</p>
    <a href="/">返回主页</a>
  </div>
</body>
</html>
