<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F4"/>
      <stop offset="1" stop-color="#F2EEE7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#151515" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#A79E91"/>
    </marker>
    <style>
      .section{font:700 28px Arial,'PingFang SC',sans-serif;fill:#222222}
      .body{font:20px Arial,'PingFang SC',sans-serif;fill:#595347}
      .small{font:17px Arial,'PingFang SC',sans-serif;fill:#7B7467}
      .label{font:700 16px Arial,'PingFang SC',sans-serif;fill:#2CA389;letter-spacing:.08em}
      .node{font:700 18px Arial,'PingFang SC',sans-serif;fill:#333333}
      .nodeSub{font:16px Arial,'PingFang SC',sans-serif;fill:#6C675D}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="58" y="88" width="372" height="724" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="94" y="136" class="label">PRD / 需求输入</text>
    <text x="94" y="186" class="section">目标、约束和验收条件</text>

    <rect x="94" y="224" width="300" height="110" rx="20" fill="#F7F2EA"/>
    <text x="118" y="262" class="small">目标</text>
    <text x="118" y="296" class="body">返回一份可编辑、可审阅的企业邮件回复草稿</text>

    <rect x="94" y="354" width="300" height="154" rx="20" fill="#F7F2EA"/>
    <text x="118" y="392" class="small">约束</text>
    <text x="118" y="426" class="body">附件抽取失败不能阻塞主链路</text>
    <text x="118" y="460" class="body">高价值客户必须经过人工确认</text>
    <text x="118" y="494" class="body">失败沉淀需要保留 trace</text>

    <rect x="94" y="528" width="300" height="206" rx="20" fill="#F7F2EA"/>
    <text x="118" y="566" class="small">验收条件</text>
    <text x="118" y="600" class="body">10 秒内返回结构化草稿</text>
    <text x="118" y="634" class="body">step 级输入输出可追踪</text>
    <text x="118" y="668" class="body">灰度可放量 / 可回滚</text>
    <text x="118" y="702" class="body">关键客户链路允许人工接管</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="88" width="412" height="724" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="506" y="136" class="label">ENTRY / FLOW</text>
    <text x="506" y="186" class="section">请求会先收成 entry，再展开 step 依赖</text>

    <rect x="506" y="224" width="340" height="104" rx="20" fill="#EDF4FA"/>
    <text x="532" y="262" class="small">entry</text>
    <text x="532" y="300" class="body">inbox_reply_entry</text>

    <rect x="506" y="346" width="340" height="104" rx="20" fill="#EDF4FA"/>
    <text x="532" y="384" class="small">flow</text>
    <text x="532" y="422" class="body">customer_reply_flow / parallel_execution: false</text>

    <rect x="506" y="470" width="340" height="264" rx="20" fill="#F7F2EA"/>
    <text x="532" y="508" class="small">识别后的 step</text>
    <text x="532" y="548" class="body">open_thread</text>
    <text x="532" y="582" class="body">scan_files</text>
    <text x="532" y="616" class="body">stage_files</text>
    <text x="532" y="650" class="body">digest_files</text>
    <text x="532" y="684" class="body">compose_reply</text>
    <text x="532" y="718" class="body">package_reply</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="922" y="88" width="620" height="724" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="958" y="136" class="label">FLOW / STEP 依赖图</text>
    <text x="958" y="186" class="section">step 关系在这里被展开成一条可执行路径</text>

    <path d="M1084 286H1188" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1300 286H1400" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1084 478H1188" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1300 478H1400" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1474 286V478" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1084 286C1162 286 1194 580 1314 580" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1460 478C1460 548 1410 580 1374 580" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="980" y="236" width="150" height="94" rx="22" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1016" y="276" class="node">open_thread</text>
    <text x="1014" y="308" class="nodeSub">thread_body / file_handles</text>

    <rect x="1204" y="236" width="164" height="94" rx="22" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1224" y="276" class="node">scan_files</text>
    <text x="1232" y="308" class="nodeSub">has_files / file_handles</text>

    <rect x="1414" y="236" width="126" height="94" rx="22" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1432" y="276" class="node">stage_files</text>
    <text x="1428" y="308" class="nodeSub">cached_files</text>

    <rect x="1204" y="428" width="164" height="94" rx="22" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1220" y="468" class="node">digest_files</text>
    <text x="1218" y="500" class="nodeSub">file_digest</text>

    <rect x="1410" y="428" width="130" height="94" rx="22" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1424" y="468" class="node">compose_reply</text>
    <text x="1420" y="500" class="nodeSub">reply_draft / review_marks</text>

    <rect x="1306" y="606" width="178" height="96" rx="22" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1338" y="646" class="node">package_reply</text>
    <text x="1350" y="678" class="nodeSub">reply_subject / body / citations</text>
  </g>

  <path d="M430 450H452" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M882 450H904" stroke="#C4BCAE" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
