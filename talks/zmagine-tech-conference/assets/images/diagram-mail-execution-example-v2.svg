<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F1F7F6"/>
    </linearGradient>
    <linearGradient id="entity" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8F4F1"/>
      <stop offset="1" stop-color="#D8F4EE"/>
    </linearGradient>
    <linearGradient id="process" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF4FB"/>
      <stop offset="1" stop-color="#DDEAF8"/>
    </linearGradient>
    <linearGradient id="decision" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF4E3"/>
      <stop offset="1" stop-color="#FFE2B8"/>
    </linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E9F8ED"/>
      <stop offset="1" stop-color="#D2EFD7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f1720" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#2F80ED"/>
    </marker>
    <style>
      .title{font:700 20px Arial,'PingFang SC',sans-serif;fill:#1976D2}
      .label{font:700 20px Arial,'PingFang SC',sans-serif;fill:#212121}
      .text{font:15px Arial,'PingFang SC',sans-serif;fill:#37474F}
      .small{font:13px Arial,'PingFang SC',sans-serif;fill:#4B5D6B}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <rect x="74" y="96" width="286" height="128" rx="22" fill="url(#entity)" stroke="#1FC7B7" stroke-width="2" filter="url(#shadow)"/>
  <text x="217" y="136" text-anchor="middle" class="label">输入请求</text>
  <text x="217" y="166" text-anchor="middle" class="text">entry = inbox_reply_entry</text>
  <text x="217" y="194" text-anchor="middle" class="text">flow = customer_reply_flow</text>
  <text x="217" y="218" text-anchor="middle" class="small">req.thread_ref = TH-118</text>

  <rect x="454" y="102" width="340" height="116" rx="20" fill="url(#process)" stroke="#2F80ED" stroke-width="2" filter="url(#shadow)"/>
  <text x="624" y="140" text-anchor="middle" class="label">配置解析</text>
  <text x="624" y="170" text-anchor="middle" class="text">inbox_reply_entry → customer_reply_flow</text>
  <text x="624" y="196" text-anchor="middle" class="small">存在: 路由与入口参数绑定</text>

  <polygon points="982,116 1072,88 1162,116 1162,202 1072,230 982,202" fill="url(#decision)" stroke="#F57C00" stroke-width="2" filter="url(#shadow)"/>
  <text x="1072" y="144" text-anchor="middle" class="label">Policy / QoS 检测</text>
  <text x="1072" y="172" text-anchor="middle" class="text">VIP gate / timeout / retry budget</text>
  <text x="1072" y="198" text-anchor="middle" class="small">通过后进入 flow</text>

  <rect x="80" y="332" width="220" height="94" rx="18" fill="url(#entity)" stroke="#1FC7B7" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="366" text-anchor="middle" class="label">Step 1｜open_thread</text>
  <text x="190" y="394" text-anchor="middle" class="text">拉取线程正文</text>
  <text x="190" y="416" text-anchor="middle" class="small">thread_body / file_handles</text>

  <rect x="360" y="332" width="240" height="94" rx="18" fill="url(#process)" stroke="#2F80ED" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="366" text-anchor="middle" class="label">Step 2｜scan_files</text>
  <text x="480" y="394" text-anchor="middle" class="text">检查文件入口</text>
  <text x="480" y="416" text-anchor="middle" class="small">has_files / file_handles</text>

  <rect x="660" y="332" width="230" height="94" rx="18" fill="url(#process)" stroke="#2F80ED" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="366" text-anchor="middle" class="label">Step 3｜stage_files</text>
  <text x="775" y="394" text-anchor="middle" class="text">缓存文件</text>
  <text x="775" y="416" text-anchor="middle" class="small">cached_files</text>

  <rect x="960" y="332" width="240" height="94" rx="18" fill="url(#process)" stroke="#2F80ED" stroke-width="2" filter="url(#shadow)"/>
  <text x="1080" y="366" text-anchor="middle" class="label">Step 4｜digest_files</text>
  <text x="1080" y="394" text-anchor="middle" class="text">整理文件摘要</text>
  <text x="1080" y="416" text-anchor="middle" class="small">file_digest</text>

  <rect x="430" y="500" width="260" height="94" rx="18" fill="url(#entity)" stroke="#1FC7B7" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="534" text-anchor="middle" class="label">Step 5｜compose_reply</text>
  <text x="560" y="562" text-anchor="middle" class="text">生成回复草稿</text>
  <text x="560" y="584" text-anchor="middle" class="small">reply_draft / review_marks</text>

  <rect x="790" y="500" width="240" height="94" rx="18" fill="url(#decision)" stroke="#F57C00" stroke-width="2" filter="url(#shadow)"/>
  <text x="910" y="534" text-anchor="middle" class="label">Step 6｜package_reply</text>
  <text x="910" y="562" text-anchor="middle" class="text">整理交付输出</text>
  <text x="910" y="584" text-anchor="middle" class="small">reply_subject / reply_body / trace_id</text>

  <ellipse cx="360" cy="716" rx="210" ry="58" fill="url(#process)" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="704" text-anchor="middle" class="label">执行附加能力</text>
  <text x="360" y="734" text-anchor="middle" class="text">Binding / State / QoS / Retry / Trace</text>

  <polygon points="728,682 820,650 912,682 912,760 820,792 728,760" fill="url(#result)" stroke="#2E7D32" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="700" text-anchor="middle" class="label">结果组件</text>
  <text x="820" y="726" text-anchor="middle" class="text">结构化草稿 / 风险说明</text>
  <text x="820" y="752" text-anchor="middle" class="small">references / trace_id</text>

  <rect x="1036" y="646" width="468" height="154" rx="22" fill="#FCECEF" stroke="#C2185B" stroke-width="2" stroke-dasharray="8 6" filter="url(#shadow)"/>
  <text x="1270" y="690" text-anchor="middle" class="label">环境组件</text>
  <text x="1270" y="720" text-anchor="middle" class="text">平台工作台 / Trace Viewer / 发布闸门</text>
  <text x="1270" y="746" text-anchor="middle" class="small">失败可 replay，放量走灰度与金丝雀</text>
  <text x="1270" y="772" text-anchor="middle" class="small">执行追踪链贯穿输入、step、结果与发布记录</text>

  <path d="M360 160H454" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M794 160H982" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1072 230C1072 278 236 292 190 332" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M300 379H360" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M600 379H660" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M890 379H960" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M190 426C190 468 450 478 500 500" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1080 426C1080 468 650 478 620 500" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M690 547H790" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M230 426C230 572 286 630 310 660" fill="none" stroke="#388E3C" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M910 594C910 634 862 650 842 658" fill="none" stroke="#2F80ED" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M570 716C650 716 678 716 728 716" fill="none" stroke="#2F80ED" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M912 722C980 722 1000 722 1036 722" fill="none" stroke="#388E3C" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
