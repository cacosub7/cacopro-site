<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F4"/>
      <stop offset="1" stop-color="#F2EEE8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#B5AEA1"/>
    </marker>
    <style>
      .title{font:700 42px Arial,'PingFang SC',sans-serif;fill:#242424}
      .sub{font:20px Arial,'PingFang SC',sans-serif;fill:#857F75}
      .section{font:700 22px Arial,'PingFang SC',sans-serif;fill:#242424}
      .body{font:18px Arial,'PingFang SC',sans-serif;fill:#5F5A52}
      .small{font:16px Arial,'PingFang SC',sans-serif;fill:#7A756D}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <text x="100" y="118" font-family="Arial,'PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#2CA389">底座必要性</text>
  <text x="100" y="170" class="title">为什么中间必须有一层 ZFlow？</text>
  <text x="100" y="205" class="sub">真正难的是结构、状态、回退和运行治理。</text>

  <g filter="url(#shadow)">
    <rect x="620" y="314" width="360" height="260" rx="36" fill="#171717"/>
    <text x="740" y="418" font-family="Arial,'PingFang SC',sans-serif" font-size="44" font-weight="700" fill="#FFFFFF">ZFlow</text>
    <text x="694" y="466" font-family="Arial,'PingFang SC',sans-serif" font-size="24" fill="#D7D1C6">编译 / 调度 / 状态 / 策略 / 追踪</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="260" width="320" height="144" rx="28" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="202" y="314" class="section">正交</text>
    <text x="202" y="350" class="body">复杂责任拆开，节点之间只保留稳定边界。</text>

    <rect x="1110" y="260" width="320" height="144" rx="28" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="1142" y="314" class="section">局部性</text>
    <text x="1142" y="350" class="body">AI 只解决局部高难度问题，不承担全库复杂度。</text>

    <rect x="170" y="556" width="320" height="144" rx="28" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="202" y="610" class="section">契约化</text>
    <text x="202" y="646" class="body">输入、输出、发布和观测全部显式声明。</text>

    <rect x="1110" y="556" width="320" height="144" rx="28" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="1142" y="610" class="section">可运行</text>
    <text x="1142" y="646" class="body">状态、回退、重试、追踪由底座统一承接。</text>
  </g>

  <path d="M490 332H620" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1110 332H980" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M490 628H620" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1110 628H980" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="230" y="764" width="1140" height="28" rx="14" fill="#F4F0E7"/>
  <text x="254" y="784" class="small">它把复杂度收进统一的可测试、可发布、可观测底座。</text>
</svg>
