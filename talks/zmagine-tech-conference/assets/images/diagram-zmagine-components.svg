<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F4"/>
      <stop offset="1" stop-color="#F4F1EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font:700 42px Arial,'PingFang SC',sans-serif;fill:#242424}
      .sub{font:20px Arial,'PingFang SC',sans-serif;fill:#857F75}
      .eyebrow{font:700 18px Arial,'PingFang SC',sans-serif;fill:#2CA389}
      .section{font:700 26px Arial,'PingFang SC',sans-serif;fill:#242424}
      .body{font:18px Arial,'PingFang SC',sans-serif;fill:#5F5A52}
      .small{font:16px Arial,'PingFang SC',sans-serif;fill:#7A756D}
      .pill{font:700 18px Arial,'PingFang SC',sans-serif}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <rect x="80" y="90" width="1440" height="720" rx="34" fill="#FFFFFF" stroke="#E8E3D9"/>

  <text x="120" y="150" class="eyebrow">宏观架构组件图</text>
  <text x="120" y="205" class="title">Zmagine 把需求、编译、执行和治理收在同一条连续生产链里。</text>
  <text x="120" y="240" class="sub">需求进入平台，编译层生成结构，执行层调用算子，治理层负责验证、发布与观测。</text>

  <rect x="120" y="300" width="960" height="92" rx="24" fill="#F7F4EE" stroke="#E5DED1"/>
  <rect x="120" y="414" width="960" height="92" rx="24" fill="#F7F4EE" stroke="#E5DED1"/>
  <rect x="120" y="528" width="960" height="92" rx="24" fill="#F7F4EE" stroke="#E5DED1"/>
  <rect x="120" y="642" width="960" height="92" rx="24" fill="#F7F4EE" stroke="#E5DED1"/>
  <rect x="120" y="756" width="960" height="66" rx="24" fill="#171717"/>

  <rect x="145" y="320" width="150" height="50" rx="18" fill="#E8F4F0"/>
  <text x="172" y="352" class="pill" fill="#2CA389">01 意图层</text>
  <text x="330" y="352" class="section">需求输入</text>
  <text x="520" y="352" class="body">PRD、业务目标、验收条件、企业规则、上线边界</text>

  <rect x="145" y="434" width="150" height="50" rx="18" fill="#ECF4FA"/>
  <text x="172" y="466" class="pill" fill="#2F8DC5">02 编译层</text>
  <text x="330" y="466" class="section">规格与蓝图</text>
  <text x="520" y="466" class="body">Handler、DAG、Step Contract、节点候选、测试基线</text>

  <rect x="145" y="548" width="150" height="50" rx="18" fill="#F8F1E7"/>
  <text x="172" y="580" class="pill" fill="#CC8D37">03 执行层</text>
  <text x="330" y="580" class="section">多 Agent 与算子执行</text>
  <text x="520" y="580" class="body">任务拆解、代码实现、节点调用、回放验证、发布准备</text>

  <rect x="145" y="662" width="150" height="50" rx="18" fill="#E8F4F0"/>
  <text x="172" y="694" class="pill" fill="#2CA389">04 治理层</text>
  <text x="330" y="694" class="section">验证、发布与观测</text>
  <text x="520" y="694" class="body">TDD、Replay、GitOps、灰度、回滚、Trace、Metrics</text>

  <text x="160" y="798" font-family="Arial,'PingFang SC',sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">ZFlow 编译 / 运行底座</text>
  <text x="465" y="798" class="small" fill="#D5D0C7">契约、调度、状态、策略、追踪统一承接</text>

  <g filter="url(#shadow)">
    <rect x="1120" y="315" width="320" height="150" rx="28" fill="#F8FBFD" stroke="#DCEAF3"/>
    <text x="1160" y="360" font-family="Arial,'PingFang SC',sans-serif" font-size="24" font-weight="700" fill="#2F8DC5">模型分层</text>
    <text x="1160" y="404" class="body">轻任务：本地模型</text>
    <text x="1160" y="438" class="body">关键决策：强模型</text>

    <rect x="1120" y="500" width="320" height="150" rx="28" fill="#F6FBF8" stroke="#D8ECE3"/>
    <text x="1160" y="545" font-family="Arial,'PingFang SC',sans-serif" font-size="24" font-weight="700" fill="#2CA389">资产闭环</text>
    <text x="1160" y="589" class="body">蓝图、模板、发布记录、回放样本</text>
    <text x="1160" y="623" class="body">全部版本化并可审计</text>
  </g>

  <path d="M1080 354H1120" stroke="#CDC7BC" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M1080 576H1120" stroke="#CDC7BC" stroke-width="3" stroke-dasharray="8 8"/>

  <rect x="120" y="828" width="1320" height="32" rx="16" fill="#F4F0E8"/>
  <text x="145" y="850" class="small">平台负责承接入口，编译层负责生成结构，底座负责运行时治理，整个链路在同一套版本与追踪体系里闭环。</text>
</svg>
