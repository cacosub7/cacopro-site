<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" rx="40" fill="#FBFAF7"/>
  <text x="120" y="150" fill="#242424" font-size="44" font-weight="700" font-family="Arial, PingFang SC, sans-serif">从单次执行型任务，到持续运行型任务</text>
  <text x="120" y="192" fill="#8B857A" font-size="20" font-family="Arial, PingFang SC, sans-serif">关键在于任务是否需要在时间维度持续存活并处理增量事件</text>

  <rect x="130" y="270" width="600" height="500" rx="30" fill="#FFFFFF" stroke="#E5E1D8"/>
  <rect x="870" y="270" width="600" height="500" rx="30" fill="#FFFFFF" stroke="#E5E1D8"/>

  <text x="180" y="340" fill="#2F8DC5" font-size="30" font-weight="700" font-family="Arial, PingFang SC, sans-serif">单次执行型任务</text>
  <text x="920" y="340" fill="#2CA389" font-size="30" font-weight="700" font-family="Arial, PingFang SC, sans-serif">持续运行型任务</text>

  <g>
    <rect x="180" y="410" width="140" height="80" rx="18" fill="#F6F3EE" stroke="#E5E1D8"/>
    <rect x="360" y="410" width="140" height="80" rx="18" fill="#F6F3EE" stroke="#E5E1D8"/>
    <rect x="540" y="410" width="140" height="80" rx="18" fill="#F6F3EE" stroke="#E5E1D8"/>
    <text x="218" y="458" fill="#242424" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif">输入</text>
    <text x="392" y="458" fill="#242424" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif">执行</text>
    <text x="574" y="458" fill="#242424" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif">结束</text>
    <path d="M320 450H360M500 450H540" stroke="#C9C3B8" stroke-width="4" stroke-linecap="round"/>
    <text x="180" y="560" fill="#6A6761" font-size="22" font-family="Arial, PingFang SC, sans-serif">当前覆盖 CRUD、报告生成、普通业务编排</text>
    <text x="180" y="602" fill="#6A6761" font-size="22" font-family="Arial, PingFang SC, sans-serif">当前无状态或弱状态编排已较成熟</text>
  </g>

  <g>
    <circle cx="1120" cy="470" r="150" fill="#F5FBF8" stroke="#D7EDE5" stroke-width="4"/>
    <text x="1060" y="478" fill="#242424" font-size="26" font-weight="700" font-family="Arial, PingFang SC, sans-serif">状态运行时</text>
    <rect x="940" y="380" width="120" height="64" rx="18" fill="#FFFFFF" stroke="#E5E1D8"/>
    <rect x="1190" y="380" width="120" height="64" rx="18" fill="#FFFFFF" stroke="#E5E1D8"/>
    <rect x="940" y="510" width="120" height="64" rx="18" fill="#FFFFFF" stroke="#E5E1D8"/>
    <rect x="1190" y="510" width="120" height="64" rx="18" fill="#FFFFFF" stroke="#E5E1D8"/>
    <text x="968" y="420" fill="#242424" font-size="20" font-weight="700" font-family="Arial, PingFang SC, sans-serif">回调</text>
    <text x="1215" y="420" fill="#242424" font-size="20" font-weight="700" font-family="Arial, PingFang SC, sans-serif">消息</text>
    <text x="968" y="550" fill="#242424" font-size="20" font-weight="700" font-family="Arial, PingFang SC, sans-serif">定时</text>
    <text x="1210" y="550" fill="#242424" font-size="20" font-weight="700" font-family="Arial, PingFang SC, sans-serif">流式</text>
    <path d="M1060 420C1080 420 1088 430 1095 450" stroke="#C9C3B8" stroke-width="3"/>
    <path d="M1190 420C1168 420 1158 430 1148 450" stroke="#C9C3B8" stroke-width="3"/>
    <path d="M1060 542C1080 542 1088 528 1095 505" stroke="#C9C3B8" stroke-width="3"/>
    <path d="M1190 542C1168 542 1158 528 1148 505" stroke="#C9C3B8" stroke-width="3"/>
    <text x="920" y="645" fill="#6A6761" font-size="22" font-family="Arial, PingFang SC, sans-serif">下一阶段正在把异步、消息、回调、流式</text>
    <text x="920" y="684" fill="#6A6761" font-size="22" font-family="Arial, PingFang SC, sans-serif">统一抽象为一个状态运行时来承接</text>
  </g>
</svg>
