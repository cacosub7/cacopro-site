<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F4"/>
      <stop offset="1" stop-color="#F2EEE8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#B5AEA1"/>
    </marker>
    <style>
      .title{font:700 42px Arial,'PingFang SC',sans-serif;fill:#242424}
      .sub{font:20px Arial,'PingFang SC',sans-serif;fill:#857F75}
      .section{font:700 22px Arial,'PingFang SC',sans-serif;fill:#242424}
      .body{font:18px Arial,'PingFang SC',sans-serif;fill:#5F5A52}
      .small{font:16px Arial,'PingFang SC',sans-serif;fill:#7A756D}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <text x="100" y="118" font-family="Arial,'PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#2CA389">驱动方式</text>
  <text x="100" y="170" class="title">AI 不是被直接放出去写代码，而是先被放进结构里。</text>
  <text x="100" y="205" class="sub">Prompt 仍然重要，但它应该在蓝图、契约、测试和发布策略之后发挥作用。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="310" width="220" height="140" rx="26" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="150" y="360" class="section">识别任务层级</text>
    <text x="150" y="400" class="body">先判断它属于输入、编译、执行还是发布。</text>

    <rect x="400" y="310" width="220" height="140" rx="26" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="430" y="360" class="section">压缩成算子</text>
    <text x="430" y="400" class="body">把问题切成局部可控的节点和 Step Contract。</text>

    <rect x="680" y="310" width="220" height="140" rx="26" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="710" y="360" class="section">注入结构上下文</text>
    <text x="710" y="400" class="body">只把当前节点需要的上下文喂给模型。</text>

    <rect x="960" y="310" width="220" height="140" rx="26" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="990" y="360" class="section">生成并校验</text>
    <text x="990" y="400" class="body">输出必须回到 contract，失败能 replay。</text>

    <rect x="1240" y="310" width="220" height="140" rx="26" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="1270" y="360" class="section">回接研发链路</text>
    <text x="1270" y="400" class="body">测试、发布、观测继续接在后面，不断链。</text>
  </g>

  <path d="M340 380H390" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M620 380H670" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M900 380H950" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1180 380H1230" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="180" y="560" width="1240" height="178" rx="34" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="220" y="614" class="section">结构真正承担了什么？</text>
    <text x="220" y="654" class="body">1. 缩小上下文范围</text>
    <text x="500" y="654" class="body">2. 约束输入输出边界</text>
    <text x="820" y="654" class="body">3. 把回退和闸门显式写出来</text>
    <text x="1180" y="654" class="body">4. 让测试与发布继续可追踪</text>
    <rect x="220" y="682" width="1160" height="22" rx="11" fill="#F4F0E7"/>
    <text x="238" y="698" class="small">结论：Prompt 不再承担“解释整个系统”，而是只在结构允许的局部范围内做高价值决策。</text>
  </g>
</svg>
