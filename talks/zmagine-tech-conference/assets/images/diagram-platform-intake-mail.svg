<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11161C"/>
      <stop offset="1" stop-color="#181F27"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#202833"/>
      <stop offset="1" stop-color="#171D25"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF7F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.18"/>
    </filter>
    <style>
      .title{font:700 30px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#F8FBFF}
      .sub{font:500 17px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#AAB7C7}
      .eyebrow{font:700 14px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#8FE8DB}
      .nav{font:600 17px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#DCE6F2}
      .chip{font:600 14px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#DCE6F2}
      .section{font:700 22px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#102031}
      .body{font:500 17px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#304155}
      .small{font:500 15px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#5E728A}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>

  <rect x="64" y="82" width="1472" height="736" rx="34" fill="#121922" stroke="#243140" filter="url(#shadow)"/>
  <rect x="64" y="82" width="320" height="736" rx="34" fill="#0F151D"/>
  <text x="110" y="148" class="eyebrow">Zmagine</text>
  <text x="110" y="194" class="title">需求、规格、蓝图、执行、验证</text>

  <rect x="104" y="248" width="240" height="58" rx="18" fill="#1FC7B7"/>
  <text x="132" y="284" class="nav" fill="#0F1720">01 对话录入</text>
  <rect x="104" y="324" width="240" height="58" rx="18" fill="#18232F"/>
  <text x="132" y="360" class="nav">02 资产识别</text>
  <rect x="104" y="400" width="240" height="58" rx="18" fill="#18232F"/>
  <text x="132" y="436" class="nav">03 编排蓝图</text>
  <rect x="104" y="476" width="240" height="58" rx="18" fill="#18232F"/>
  <text x="132" y="512" class="nav">04 验证与发布</text>

  <rect x="430" y="116" width="106" height="40" rx="14" fill="#1D2A36"/>
  <text x="452" y="142" class="chip">任务 ID</text>
  <rect x="544" y="116" width="154" height="40" rx="14" fill="#1D2A36"/>
  <text x="568" y="142" class="chip">ZMG-EML-042</text>
  <rect x="716" y="116" width="110" height="40" rx="14" fill="#1D2A36"/>
  <text x="742" y="142" class="chip">v0.9.7</text>
  <rect x="844" y="116" width="122" height="40" rx="14" fill="#1D2A36"/>
  <text x="872" y="142" class="chip">staging</text>

  <rect x="430" y="194" width="1060" height="580" rx="28" fill="url(#panel)" stroke="#273444"/>

  <rect x="470" y="240" width="490" height="258" rx="22" fill="url(#card)"/>
  <text x="506" y="286" class="section">需求输入</text>
  <rect x="506" y="318" width="418" height="90" rx="18" fill="#E8F4F1"/>
  <text x="534" y="352" class="body">输入 mail_id，返回一份结构化回复草稿。</text>
  <text x="534" y="382" class="body">需要读取正文、检查附件、下载附件、提取附件文本、</text>
  <text x="534" y="412" class="body">生成回复建议，并最终 format_response。</text>
  <rect x="506" y="426" width="418" height="90" rx="18" fill="#F3F7FB"/>
  <text x="534" y="460" class="body">已识别为邮件回复主线案例，建议编译为 6 个主节点：</text>
  <text x="534" y="490" class="small">load_mail → inspect_attachments → download_attachments</text>
  <text x="534" y="514" class="small">→ extract_attachment_text → draft_reply → format_response</text>

  <rect x="1000" y="240" width="450" height="258" rx="22" fill="url(#card)"/>
  <text x="1036" y="286" class="section">识别结果</text>
  <rect x="1036" y="320" width="378" height="46" rx="14" fill="#F2F7FB"/>
  <text x="1062" y="349" class="body">关联服务：Mail Gateway / OCR / LLM / Formatter</text>
  <rect x="1036" y="384" width="378" height="46" rx="14" fill="#F2F7FB"/>
  <text x="1062" y="413" class="body">运行能力：Policy / QoS / Retry / Trace / Replay</text>
  <rect x="1036" y="448" width="378" height="46" rx="14" fill="#F2F7FB"/>
  <text x="1062" y="477" class="body">命中资产：mail_attachment_extract.zflow</text>
  <rect x="1036" y="512" width="378" height="46" rx="14" fill="#F2F7FB"/>
  <text x="1062" y="541" class="body">命中资产：customer_reply_draft.zflow</text>

  <rect x="470" y="534" width="980" height="196" rx="22" fill="url(#card)"/>
  <text x="506" y="580" class="section">规格编译摘要</text>
  <text x="506" y="620" class="body">主节点：load_mail → inspect_attachments → download_attachments</text>
  <text x="506" y="650" class="body">→ extract_attachment_text → draft_reply → format_response</text>
  <text x="506" y="692" class="small">输出：handler / dag / nodes、输入输出契约、失败路径、发布闸门、trace 基线</text>
  <text x="506" y="720" class="small">下一步：进入 DAG YAML、算子实现与验证链路</text>
</svg>

