<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F4"/>
      <stop offset="1" stop-color="#F2EEE8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#B5AEA1"/>
    </marker>
    <style>
      .title{font:700 42px Arial,'PingFang SC',sans-serif;fill:#242424}
      .sub{font:20px Arial,'PingFang SC',sans-serif;fill:#857F75}
      .section{font:700 22px Arial,'PingFang SC',sans-serif;fill:#242424}
      .body{font:18px Arial,'PingFang SC',sans-serif;fill:#5F5A52}
      .small{font:16px Arial,'PingFang SC',sans-serif;fill:#7A756D}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <text x="100" y="118" font-family="Arial,'PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#2CA389">局部上下文与测试</text>
  <text x="100" y="170" class="title">AI 只处理局部任务，流程保持可复现，每个算子都能独立测试。</text>
  <text x="100" y="205" class="sub">局部输入、并行测试、Replay 与发布闸门被绑定在同一条执行链里。</text>

  <g filter="url(#shadow)">
    <rect x="100" y="280" width="360" height="470" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="132" y="334" class="section">① 局部上下文</text>
    <rect x="132" y="372" width="296" height="86" rx="18" fill="#F7F3EC"/>
    <text x="156" y="406" class="small">mail_content</text>
    <text x="156" y="434" class="body">邮件正文与历史线程摘要</text>
    <rect x="132" y="478" width="296" height="86" rx="18" fill="#F7F3EC"/>
    <text x="156" y="512" class="small">AttachmentSummary[]</text>
    <text x="156" y="540" class="body">附件文本已经先被抽取与压缩</text>
    <rect x="132" y="584" width="296" height="120" rx="18" fill="#F7F3EC"/>
    <text x="156" y="618" class="small">ReplyDraftContract</text>
    <text x="156" y="646" class="body">输出必须回到结构化草稿契约</text>
    <text x="156" y="676" class="body">后面才能验证、发布和回放</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="280" width="500" height="470" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="552" y="334" class="section">② 每个算子都能独立测试</text>
    <rect x="552" y="376" width="436" height="70" rx="18" fill="#ECF4FA"/>
    <text x="576" y="418" class="body">load_mail</text><text x="752" y="418" class="small">unit / contract</text>
    <rect x="552" y="470" width="436" height="70" rx="18" fill="#ECF4FA"/>
    <text x="576" y="512" class="body">extract_attachment_text</text><text x="778" y="512" class="small">unit / replay</text>
    <rect x="552" y="564" width="436" height="70" rx="18" fill="#ECF4FA"/>
    <text x="576" y="606" class="body">draft_reply</text><text x="752" y="606" class="small">unit / integration</text>
    <rect x="552" y="658" width="436" height="70" rx="18" fill="#ECF4FA"/>
    <text x="576" y="700" class="body">format_response</text><text x="766" y="700" class="small">contract / snapshot</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="280" width="420" height="470" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="1112" y="334" class="section">③ 可复现流程</text>
    <path d="M1170 420H1405" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M1170 540H1405" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="1112" y="386" width="132" height="72" rx="18" fill="#F7F3EC"/><text x="1134" y="418" class="small">blueprint</text><text x="1135" y="442" class="body">bp-8f4c31</text>
    <rect x="1360" y="386" width="108" height="72" rx="18" fill="#F7F3EC"/><text x="1380" y="418" class="small">replay</text><text x="1383" y="442" class="body">samples</text>
    <rect x="1112" y="506" width="132" height="72" rx="18" fill="#F7F3EC"/><text x="1142" y="538" class="small">gate</text><text x="1133" y="562" class="body">manual_if_vip</text>
    <rect x="1360" y="506" width="108" height="72" rx="18" fill="#F7F3EC"/><text x="1380" y="538" class="small">release</text><text x="1387" y="562" class="body">ring-b</text>
    <rect x="1112" y="626" width="356" height="90" rx="18" fill="#E8F4F0"/>
    <text x="1140" y="662" class="small">一条链上的结果</text>
    <text x="1140" y="694" class="body">失败样本可 replay，发布记录可追溯，后续放量有据可依</text>
  </g>
</svg>
