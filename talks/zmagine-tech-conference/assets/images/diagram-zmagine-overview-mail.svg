<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef8f6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbfd"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6fbf8"/>
      <stop offset="100%" stop-color="#d8f5ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f1720" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f80ed"/>
    </marker>
    <style>
      .title{font:700 34px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f1720}
      .subtitle{font:500 18px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
      .h{font:700 24px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f1720}
      .b{font:500 17px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}
      .s{font:500 15px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#64748b}
      .tag{font:700 16px 'PingFang SC','Microsoft YaHei',sans-serif;fill:#0f1720}
      .code{font:500 15px 'SFMono-Regular','Menlo','Consolas',monospace;fill:#dbe7f3}
      .codeDark{font:500 15px 'SFMono-Regular','Menlo','Consolas',monospace;fill:#111827}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="72" y="76" class="title">Zmagine AI 编译系统总览（邮件案例完整版）</text>
  <text x="72" y="110" class="subtitle">从一句需求，到规格、编排蓝图、智能算子执行、验证与交付闭环，全部围绕 mailId → 结构化回复草稿</text>

  <rect x="72" y="146" rx="30" ry="30" width="1456" height="118" fill="url(#card)" stroke="#d7e2ea" filter="url(#shadow)"/>
  <circle cx="128" cy="205" r="26" fill="#22c7b8"/>
  <text x="120" y="213" class="tag">1</text>
  <text x="178" y="192" class="h">需求输入层</text>
  <text x="178" y="224" class="b">一句话需求：输入 mailId，返回一份结构化回复草稿</text>
  <text x="880" y="192" class="b">入口形态：对话录入、表单录入、既有邮件系统触发、批量任务入口</text>
  <text x="880" y="224" class="s">这一层先固化问题定义与验收口径，再进入规格、编排和实现链路</text>

  <rect x="150" y="310" rx="30" ry="30" width="1300" height="132" fill="url(#card)" stroke="#cce7df" filter="url(#shadow)"/>
  <circle cx="208" cy="376" r="26" fill="#2f80ed"/>
  <text x="200" y="384" class="tag">2</text>
  <text x="262" y="362" class="h">规格与编排蓝图层</text>
  <text x="262" y="396" class="b">主流程被压缩成显式结构：读取正文 → 检查附件 → 下载附件 → 提取附件文本 → 回复生成 → 结构化输出</text>
  <text x="262" y="426" class="s">输出包括：规格说明、节点依赖、输入输出契约、失败路径、.zflow / DAG 编排蓝图</text>

  <rect x="238" y="502" rx="42" ry="42" width="1124" height="168" fill="url(#accent)" stroke="#24c6b7" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="800" y="554" text-anchor="middle" class="h">ZFlow 编译 / 运行底座</text>
  <text x="800" y="590" text-anchor="middle" class="b">解析 · 调度 · Binding · Runtime · State · Policy · 执行追踪链 · 运行上下文</text>
  <text x="800" y="624" text-anchor="middle" class="s">它负责把流程、算子、状态、验证、追踪统一起来，让业务只表达结构，让模型只处理高复杂度理解与生成</text>

  <rect x="72" y="728" rx="24" ry="24" width="448" height="124" fill="url(#card)" stroke="#d7e2ea" filter="url(#shadow)"/>
  <circle cx="126" cy="790" r="24" fill="#22c7b8"/>
  <text x="118" y="798" class="tag">3</text>
  <text x="180" y="774" class="h">多 Agent 研发执行层</text>
  <text x="180" y="806" class="b">规格冻结、智能算子实现、测试生成、审阅点协同</text>
  <text x="180" y="832" class="s">多人 / 多 Agent 可以并行，但必须共用一份编排蓝图与契约</text>

  <rect x="576" y="728" rx="24" ry="24" width="448" height="124" fill="url(#card)" stroke="#d7e2ea" filter="url(#shadow)"/>
  <circle cx="630" cy="790" r="24" fill="#2f80ed"/>
  <text x="622" y="798" class="tag">4</text>
  <text x="684" y="774" class="h">验证与质量闸门层</text>
  <text x="684" y="806" class="b">契约校验、依赖校验、结构化输出检查、失败恢复策略</text>
  <text x="684" y="832" class="s">AI 生成只是中段动作，质量闸门才决定系统能否进入真实交付</text>

  <rect x="1080" y="728" rx="24" ry="24" width="448" height="124" fill="url(#card)" stroke="#d7e2ea" filter="url(#shadow)"/>
  <circle cx="1134" cy="790" r="24" fill="#ffb657"/>
  <text x="1126" y="798" class="tag">5</text>
  <text x="1188" y="774" class="h">交付与观测层</text>
  <text x="1188" y="806" class="b">发布、追踪回放、指标回流、蓝图复用、故障定位</text>
  <text x="1188" y="832" class="s">上线以后仍然能沿着执行追踪链回看：输入、节点、输出、失败点到底发生了什么</text>

  <line x1="800" y1="264" x2="800" y2="310" stroke="#2f80ed" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="800" y1="442" x2="800" y2="502" stroke="#2f80ed" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="616" y1="670" x2="344" y2="728" stroke="#2f80ed" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="800" y1="670" x2="800" y2="728" stroke="#2f80ed" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="984" y1="670" x2="1256" y2="728" stroke="#2f80ed" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
