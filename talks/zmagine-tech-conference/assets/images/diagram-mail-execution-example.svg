<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F4"/>
      <stop offset="1" stop-color="#F2EEE8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#B5AEA1"/>
    </marker>
    <style>
      .title{font:700 42px Arial,'PingFang SC',sans-serif;fill:#242424}
      .sub{font:20px Arial,'PingFang SC',sans-serif;fill:#857F75}
      .section{font:700 22px Arial,'PingFang SC',sans-serif;fill:#242424}
      .body{font:18px Arial,'PingFang SC',sans-serif;fill:#5F5A52}
      .small{font:16px Arial,'PingFang SC',sans-serif;fill:#7A756D}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <text x="100" y="118" font-family="Arial,'PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#2CA389">执行示例图</text>
  <text x="100" y="170" class="title">一次邮件执行，会沿着这条路径走完整个关键链路。</text>
  <text x="100" y="205" class="sub">入口、执行图、局部算子、结果格式化与运行追踪，会在一次调用里串起来。</text>

  <g filter="url(#shadow)">
    <rect x="90" y="280" width="260" height="134" rx="24" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="122" y="332" class="section">请求进入</text>
    <text x="122" y="370" class="body">handler = enterprise_mail_reply</text>
    <text x="122" y="402" class="body">req.mail_id = EM-118</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="280" width="300" height="134" rx="24" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="462" y="332" class="section">路由到 DAG</text>
    <text x="462" y="370" class="body">dag = mail_reply_main</text>
    <text x="462" y="402" class="body">parallel_execution = false</text>
  </g>

  <path d="M350 346H420" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="820" y="250" width="680" height="470" rx="30" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="852" y="304" class="section">执行路径</text>

    <path d="M920 388H1038" stroke="#C8C1B4" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M1116 388H1240" stroke="#C8C1B4" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M1116 520H1240" stroke="#C8C1B4" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M1320 388V520" stroke="#C8C1B4" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M920 388C1020 388 1088 622 1218 622" stroke="#C8C1B4" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M1320 520C1320 590 1282 622 1218 622" stroke="#C8C1B4" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="868" y="350" width="120" height="72" rx="18" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="889" y="382" class="small">load_mail</text>
    <text x="886" y="406" class="body">读取邮件正文</text>

    <rect x="1048" y="350" width="120" height="72" rx="18" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1056" y="382" class="small">inspect_attachments</text>
    <text x="1071" y="406" class="body">检查附件</text>

    <rect x="1250" y="350" width="140" height="72" rx="18" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1260" y="382" class="small">download_attachments</text>
    <text x="1287" y="406" class="body">下载附件</text>

    <rect x="1048" y="482" width="140" height="72" rx="18" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1058" y="514" class="small">extract_attachment_text</text>
    <text x="1087" y="538" class="body">抽取文本</text>

    <rect x="1250" y="482" width="132" height="72" rx="18" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1274" y="514" class="small">draft_reply</text>
    <text x="1273" y="538" class="body">生成草稿</text>

    <rect x="1218" y="594" width="140" height="72" rx="18" fill="#FFFFFF" stroke="#DAD3C7"/>
    <text x="1240" y="626" class="small">format_response</text>
    <text x="1246" y="650" class="body">格式化结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="560" width="640" height="160" rx="28" fill="#FFFFFF" stroke="#E6E0D5"/>
    <text x="122" y="610" class="section">执行结果</text>
    <text x="122" y="648" class="body">返回结构化回复草稿、风险说明和 trace_id</text>
    <text x="122" y="684" class="body">失败节点可以 replay，发布前仍然会走测试和闸门</text>
  </g>

  <path d="M730 346H800" stroke="#BDB5A8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1080 720C1080 758 618 758 618 724" stroke="#D7D0C4" stroke-width="2.5" stroke-dasharray="8 8"/>
</svg>
