<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#151515" flood-opacity="0.08"/>
    </filter>
    <style>
      .axis{font:600 20px Arial,'PingFang SC',sans-serif;fill:#6B665B}
      .hint{font:14px Arial,'PingFang SC',sans-serif;fill:#8A8378}
      .title{font:700 26px Arial,'PingFang SC',sans-serif;fill:#242424}
      .sub{font:16px Arial,'PingFang SC',sans-serif;fill:#7E786E}
    </style>
  </defs>

  <rect width="1600" height="900" rx="40" fill="#FBFAF7"/>

  <line x1="150" y1="730" x2="1490" y2="730" stroke="#C3BCB0" stroke-width="4"/>
  <line x1="150" y1="730" x2="150" y2="138" stroke="#C3BCB0" stroke-width="4"/>

  <text x="1210" y="778" class="axis">结构承载能力</text>
  <text x="64" y="404" class="axis" transform="rotate(-90 64 404)">自动执行能力</text>
  <text x="190" y="126" class="hint">越往右，越接近系统级结构与团队级资产；越往上，越偏自动执行能力</text>

  <g filter="url(#shadow)">
    <rect x="214" y="594" width="284" height="112" rx="26" fill="#FFFFFF" stroke="#E6E0D7"/>
    <text x="248" y="644" class="title">Skill / Spec Kit</text>
    <text x="248" y="680" class="sub">Superpowers / BAMD / GTD2</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="516" y="470" width="296" height="112" rx="26" fill="#FFFFFF" stroke="#E6E0D7"/>
    <text x="552" y="520" class="title">Spec IDE / SDD</text>
    <text x="552" y="556" class="sub">OpenSpec / Kiro 类路线</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="250" width="334" height="122" rx="28" fill="#FFFFFF" stroke="#E6E0D7"/>
    <text x="678" y="302" class="title">Agent Programmer</text>
    <text x="690" y="340" class="sub">Devin / Codex / Claude Code</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1018" y="358" width="254" height="116" rx="28" fill="#F7FAFC" stroke="#D8E9F4"/>
    <text x="1088" y="408" font-family="Arial,'PingFang SC',sans-serif" font-size="30" font-weight="700" fill="#2F8DC5">Archon</text>
    <text x="1060" y="446" class="sub">开源结构路标</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1242" y="176" width="280" height="132" rx="30" fill="#F5FBF8" stroke="#D7EDE5"/>
    <text x="1318" y="230" font-family="Arial,'PingFang SC',sans-serif" font-size="34" font-weight="700" fill="#2CA389">Zmagine</text>
    <text x="1296" y="270" class="sub">AI 原生编译系统</text>
  </g>

  <path d="M360 594C474 534 560 506 676 500" stroke="#D2CCC0" stroke-width="3" stroke-dasharray="10 8"/>
  <path d="M812 452C900 404 968 392 1020 402" stroke="#D2CCC0" stroke-width="3" stroke-dasharray="10 8"/>
  <path d="M974 286C1072 240 1162 220 1244 216" stroke="#D2CCC0" stroke-width="3" stroke-dasharray="10 8"/>
</svg>
